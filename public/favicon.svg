<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Solid Black Background -->
  <rect width="100" height="100" fill="#000000" />
  
  <!-- Outer D Letter -->
  <path d="M 20 16 
           L 56 16 
           A 34 34 0 0 1 56 84 
           L 20 84 
           Z 
           M 36 30 
           L 36 70 
           L 44 70 
           A 20 20 0 0 0 44 30 
           Z" 
        fill="#ffffff" />
        
  <!-- exp Inside D's Counter -->
  <text x="32" y="55" 
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif" 
        font-size="12" 
        font-weight="bold" 
        fill="#ffffff" 
        letter-spacing="-0.5">exp</text>
        
  <!-- Small e in Bottom Right -->
  <text x="64" y="84" 
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif" 
        font-size="30" 
        font-weight="900" 
        fill="#ffffff" 
        letter-spacing="-0.5">e</text>
</svg>